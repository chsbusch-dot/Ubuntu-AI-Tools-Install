name: OpenClaw Compatibility Check

on:
  schedule:
    # Run daily at 08:00 UTC (1:00 AM Pacific)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write   # needed to create/list issues
  contents: read  # needed for actions/checkout

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-openclaw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check OpenClaw npm package & installer compatibility
        run: bash tests/check-openclaw-compat.sh

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Skip if an open openclaw-compat issue already exists
          OPEN=$(gh issue list --repo "$GH_REPO" \
                   --label openclaw-compat --state open --json number --jq 'length')
          if [ "${OPEN:-0}" -gt 0 ]; then
            echo "Open issue already exists — skipping creation."
            exit 0
          fi

          gh issue create \
            --repo "$GH_REPO" \
            --title "⚠️ OpenClaw compatibility check failed" \
            --label "openclaw-compat" \
            --body "The daily OpenClaw compatibility check failed.

This means the \`openclaw\` npm package or installer may have changed
in a way that breaks our direct \`npm install -g openclaw\` approach
in \`ubuntu-prep-setup.sh\`.

**Action needed:** Review the [workflow run](${RUN_URL}) and update \`install_openclaw()\` if necessary.

Common changes to watch for:
- \`bin\` field in package.json renamed (binary no longer called \`openclaw\`)
- \`onboard\` subcommand renamed or removed
- Install method changed from npm to something else
- Package moved to a different npm scope (e.g. \`@openclaw/cli\`)
- \`@beta\` tag removed or renamed"
